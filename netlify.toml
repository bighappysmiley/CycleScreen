# Netlify configuration for CycleScreen (static site, no build step)
[build]
  publish = "."
  command = ""

# SPA-style fallback so any path loads the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # GPS, phone, mic for voice notes; autoplay for embedded players
    Permissions-Policy = "geolocation=(self), bluetooth=(self), microphone=(self), autoplay=*"
    # Always revalidate so the kiosk picks up new deploys (304 when unchanged)
    Cache-Control = "no-cache"
